# agent-notes: { ctx: "CI pipeline — pytest (coverage gate via pyproject) on Python 3.10 and 3.12", deps: [pyproject.toml], state: active, last: "sato@2026-06-23" }
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests (coverage gate enforced via pyproject.toml)
        run: uv run pytest
